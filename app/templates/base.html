<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>{% block title %}Emry Global Tech Realm | We Can Fix It{% endblock %}</title>
    <meta name="description" content="Emry Global Tech Realm — Your trusted destination for smartphone sales, phone parts, accessories, and professional repair services. Book an appointment today.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Mobile Navigation -->
    <nav class="glass-nav" id="main-nav">
        <div class="nav-container">
            <a href="{{ url_for('main.index') }}" class="logo-brand">
                <span class="logo-e">E</span><span class="logo-mry">MRY</span><span class="logo-s-accent">S</span>
                <span class="logo-sub">GLOBAL TECH REALM</span>
            </a>
            <button class="hamburger" id="hamburger-btn" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="nav-drawer" id="nav-drawer">
            <a href="{{ url_for('main.index') }}#home" class="nav-item" onclick="closeNav()">🏠 Home</a>
            <a href="{{ url_for('main.index') }}#services" class="nav-item" onclick="closeNav()">🔧 Services</a>
            <a href="{{ url_for('main.index') }}#gallery" class="nav-item" onclick="closeNav()">📸 Gallery</a>
            <a href="{{ url_for('main.index') }}#shop" class="nav-item" onclick="closeNav()">🛒 Shop</a>
            <a href="{{ url_for('main.index') }}#appointment" class="nav-item nav-cta" onclick="closeNav()">📅 Book Appointment</a>
            {% if session.is_admin %}
                <a href="{{ url_for('main.admin_dashboard') }}" class="nav-item admin-badge">⚙ Dashboard</a>
                <a href="{{ url_for('main.admin_logout') }}" class="nav-item logout-btn">🚪 Exit</a>
            {% else %}
                <a href="{{ url_for('main.admin_dashboard') }}" class="nav-item admin-icon-link">⚙</a>
            {% endif %}
        </div>
    </nav>

    <main class="content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-brand">
            <span class="logo-e">E</span><span class="logo-mry">MRY</span><span class="logo-s-accent">S</span>
            <span class="footer-tagline">GLOBAL TECH REALM</span>
        </div>
        <p class="footer-slogan">— QUALITY · TRUST · RELIABILITY —</p>
        <p class="footer-copy">© 2025 Emry Global Tech Realm. All Rights Reserved.</p>
    </footer>

    <div id="toast-notification" class="toast hidden"></div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
